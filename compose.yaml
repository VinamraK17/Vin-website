services:
  # 1. MariaDB Database (Mapped to portfolio-db)
  portfolio-db:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: YOUR_ROOT_PASSWORD_HERE
      MARIADB_DATABASE: portfolio
      MARIADB_USER: portfolio_user
      MARIADB_PASSWORD: YOUR_USER_PASSWORD_HERE
    volumes:
      - /volume1/docker/portfolio-db:/var/lib/mysql
    networks:
      - portfolio-network
    restart: always

  # 2. Portfolio Web Server (Exposed directly from GitHub)
  portfolio-web:
    build: .
    depends_on:
      - portfolio-db
    environment:
      - DATABASE_URL=mysql://portfolio_user:YOUR_USER_PASSWORD_HERE@portfolio-db:3306/portfolio
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - portfolio-network
    restart: always

networks:
  portfolio-network:
    driver: bridge
